<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
  </head>
  <body>
    <script>
      (function () {
        var l = window.location;
        var base = "/augustinetwoli.pf";
        var path = l.pathname;

        if (path.startsWith(base + "/")) {
          path = path.slice(base.length);
        }

        var newUrl = l.origin + base + "/?p=" + encodeURIComponent(path + l.search + l.hash);
        l.replace(newUrl);
      })();
    </script>
  </body>
</html>
